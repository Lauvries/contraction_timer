# Optional Netlify deploy — does NOT run on git push (use GitHub Pages for that).
# Run manually: Actions → Deploy to Netlify → Run workflow
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NETLIFY_AUTH_TOKEN  Netlify → User settings → Applications → Personal access tokens
#   NETLIFY_SITE_ID     Site → Site configuration → Site details → Site ID
#   SUPABASE_URL        Supabase → Project Settings → API → Project URL
#   SUPABASE_ANON_KEY   Supabase → Project Settings → API → anon public

name: Deploy to Netlify

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build (inject Supabase from secrets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: netlify deploy --prod --dir . --site "${{ secrets.NETLIFY_SITE_ID }}"
