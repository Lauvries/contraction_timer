# After first push: GitHub repo → Settings → Pages → Source: GitHub Actions.
# Live URL is usually https://<owner>.github.io/<repo>/

name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html contractions.html contractions_page.js feeds_page.js feeds.js auth.js pull_to_refresh.js styles.css supabase-config.js _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
