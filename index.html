<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1523" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Baby tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <nav class="top-nav" aria-label="Primary">
        <a class="top-nav-link is-active" href="./index.html" aria-current="page">Baby</a>
        <span class="top-nav-sep" aria-hidden="true">·</span>
        <a class="top-nav-link" href="./contractions.html">Contractions</a>
      </nav>

      <header class="header baby-header">
        <h1 class="title">Baby</h1>
        <p id="syncStatus" class="sync-status" hidden></p>
      </header>

      <div class="app-layout">
        <div class="app-panel app-panel--control">
          <section class="stats" aria-label="Feeding summary">
            <div class="stat-card baby-stat-card">
              <div class="stat-label">Time since last feed started</div>
              <div class="stat-value" id="feedTimeSince">—</div>
              <div class="stat-hint">Target: every 3 hours</div>
            </div>
            <div class="stat-card baby-stat-card">
              <div class="stat-label">Next feed at</div>
              <div class="stat-value" id="feedTimeTo">—</div>
              <div class="stat-hint" id="feedTimeToHint"></div>
            </div>
          </section>

          <section class="timer-zone" aria-label="Feeding controls">
            <div class="feeding-triplet" aria-label="Start, pause, stop">
              <button type="button" class="main-btn feeding-main-btn feeding-main-btn--left" id="feedLeft">
                <span class="main-btn-label" id="feedLeftLabel">
                  <span class="feeding-btn-text" id="feedLeftText">Left</span>
                  <span class="feeding-btn-icon" id="feedLeftIcon" aria-hidden="true"></span>
                </span>
              </button>

              <button type="button" class="feeding-stop-mid" id="feedStopMid" aria-label="Stop current breast" disabled>
                Stop
              </button>

              <button type="button" class="main-btn feeding-main-btn feeding-main-btn--right" id="feedRight">
                <span class="main-btn-label" id="feedRightLabel">
                  <span class="feeding-btn-text" id="feedRightText">Right</span>
                  <span class="feeding-btn-icon" id="feedRightIcon" aria-hidden="true"></span>
                </span>
              </button>
            </div>

          </section>
        </div>

        <div class="app-panel app-panel--history">
          <section class="history-section" aria-labelledby="feedsRecentTitle">
            <div class="history-toolbar">
              <h2 id="feedsRecentTitle" class="history-heading">Feeds</h2>
              <div class="feed-pagination" aria-label="Feed pages">
                <button type="button" class="feed-page-btn" id="feedsPrevPage" disabled>Prev</button>
                <span class="feed-page-label" id="feedsPageLabel" aria-live="polite"></span>
                <button type="button" class="feed-page-btn" id="feedsNextPage" disabled>Next</button>
              </div>
            </div>
            <ul class="feed-list" id="feedsList"></ul>
            <p class="history-empty" id="feedsEmpty">No feeds logged yet.</p>
          </section>
        </div>
      </div>

      <footer class="app-footer" aria-label="App actions">
        <div class="app-footer-actions">
          <button
            type="button"
            id="feedsClearAllBtn"
            class="header-options-btn header-options-btn--danger app-footer-clear"
            hidden
            aria-label="Clear all feeds"
          >
            Clear all feeds
          </button>
          <div class="app-footer-trailing">
            <button type="button" class="header-options-btn" id="reloadBtn" aria-label="Reload app">Reload</button>
            <button type="button" class="header-options-btn" id="signOutBtn" hidden>Sign out</button>
          </div>
        </div>
      </footer>
    </div>

    <dialog class="options-dialog login-dialog" id="loginDialog" aria-labelledby="loginTitle" aria-modal="true">
      <form class="options-form" id="loginForm">
        <h2 id="loginTitle" class="options-title">Sign in</h2>
        <p class="options-intro">
          Same email and password as in Supabase (Authentication → Users). This makes your logs show up on other devices.
        </p>
        <div class="options-field">
          <label class="options-label" for="loginEmail">Email</label>
          <div class="options-number-wrap login-field-wrap">
            <input
              id="loginEmail"
              name="email"
              class="options-input"
              type="email"
              autocomplete="username"
              required
            />
          </div>
        </div>
        <div class="options-field">
          <label class="options-label" for="loginPassword">Password</label>
          <div class="options-number-wrap login-field-wrap">
            <input
              id="loginPassword"
              name="password"
              class="options-input"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
        </div>
        <p id="loginError" class="options-hint login-error" hidden></p>
        <div class="options-actions login-actions">
          <button type="submit" class="btn-primary login-submit" id="loginSubmit">Sign in</button>
        </div>
      </form>
    </dialog>

    <script src="supabase-config.js"></script>
    <script type="module" src="baby.js"></script>
  </body>
</html>
